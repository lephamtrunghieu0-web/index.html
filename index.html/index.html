<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Học trực tuyến CNTT</title>

<style>
body{
    margin:0;
    font-family: Times New Roman;
}

.container{
    display:flex;
    height:100vh;
}

/* menu bên trái */
.menu{
    width:220px;
    background:#ddd;
}

.menu ul{
    list-style:none;
    padding:0;
    margin:0;
}

.menu li{
    padding:15px;
    border-bottom:1px solid #ccc;
}

.menu li.active{
    background:gray;
    color:white;
}

/* nội dung bên phải */
.content{
    flex:1;
    padding:30px;
}

h1{
    margin-top:0;
}
</style>

</head>

<body>

<div class="container">

<!-- Menu -->
<div class="menu">
<ul>
<li class="active">Trang chủ</li>
<li>Khóa học</li>
<li>Diễn đàn</li>
<li>Liên hệ</li>
</ul>
</div>

<!-- Nội dung -->
<div class="content">
<h1>Học trực tuyến Công nghệ thông tin</h1>

<h3>Các khóa học:</h3>

<ol>
<li>Lập trình cơ bản</li>
<li>Cấu trúc dữ liệu</li>
<li>Thiết kế web</li>
</ol>

</div>

</div>

</body>
</html>
